<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Craftmatic — API Data Comparison</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a14;
      color: #e4e4ef;
      min-height: 100vh;
      padding: 20px;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #5865f2;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #8888a8;
      margin-bottom: 20px;
    }

    /* ─── Location Nav ─── */
    .nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .nav-btn {
      background: #16162a;
      border: 1px solid #2a2a44;
      color: #b0b0c8;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      line-height: 1.3;
      text-align: center;
    }
    .nav-btn:hover { border-color: #5865f2; color: #e4e4ef; }
    .nav-btn.active { background: #5865f2; border-color: #5865f2; color: #fff; }
    .nav-label { font-weight: 600; font-size: 13px; display: block; }
    .nav-addr { font-size: 10px; opacity: 0.7; display: block; margin-top: 2px; }

    /* ─── View Tabs ─── */
    .tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 12px; }
    .tab-btn {
      background: #16162a;
      border: 1px solid #2a2a44;
      color: #b0b0c8;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .tab-btn:hover { border-color: #5865f2; }
    .tab-btn.active { background: #2a2a44; border-color: #5865f2; color: #e4e4ef; }

    /* ─── Layer Selector ─── */
    .layers { display: flex; justify-content: center; gap: 4px; margin-bottom: 12px; min-height: 28px; }
    .layers.hidden { display: none; }
    .layer-btn {
      width: 28px; height: 28px;
      background: #16162a;
      border: 1px solid #2a2a44;
      color: #b0b0c8;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .layer-btn:hover { border-color: #5865f2; }
    .layer-btn.active { background: #5865f2; border-color: #5865f2; color: #fff; }

    /* ─── Slider Container ─── */
    .slider-wrap {
      position: relative;
      max-width: 1200px;
      margin: 0 auto 20px;
      background: #0d0d1a;
      border: 1px solid #2a2a44;
      border-radius: 10px;
      overflow: hidden;
    }
    .slider-area {
      position: relative;
      width: 100%;
      min-height: 300px;
      touch-action: none;
      cursor: col-resize;
    }
    .slider-area img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    .img-noapi { z-index: 1; }
    .img-api { z-index: 2; }

    /* ─── Divider ─── */
    .divider {
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      background: #5865f2;
      z-index: 10;
      pointer-events: none;
    }
    .divider-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px; height: 36px;
      background: #5865f2;
      border: 2px solid #fff;
      border-radius: 50%;
      z-index: 11;
      pointer-events: auto;
      cursor: col-resize;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .divider-handle::before {
      content: '\25c4 \25ba';
      color: #fff;
      font-size: 10px;
      letter-spacing: -1px;
    }

    /* ─── Side Labels ─── */
    .label-left, .label-right {
      position: absolute;
      top: 10px;
      z-index: 15;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      pointer-events: none;
    }
    .label-left {
      left: 10px;
      background: rgba(220, 60, 60, 0.85);
      color: #fff;
    }
    .label-right {
      right: 10px;
      background: rgba(40, 167, 69, 0.85);
      color: #fff;
    }

    /* ─── Generation Summary ─── */
    .gen-summary {
      max-width: 1200px;
      margin: 0 auto 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .gen-card {
      background: #16162a;
      border: 1px solid #2a2a44;
      border-radius: 8px;
      padding: 14px;
    }
    .gen-card h4 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a2a44;
    }
    .gen-card.noapi h4 { color: #dc3c3c; }
    .gen-card.api h4 { color: #28a745; }
    .gen-card table { width: 100%; font-size: 11px; border-collapse: collapse; }
    .gen-card td { padding: 3px 0; vertical-align: top; }
    .gen-card td:first-child { color: #8888a8; width: 100px; font-weight: 500; }
    .gen-card td:last-child {
      color: #e4e4ef;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
    }

    /* ─── API Data Tables ─── */
    .api-section {
      max-width: 1200px;
      margin: 0 auto 16px;
    }
    .api-section h3 {
      font-size: 14px;
      font-weight: 600;
      color: #5865f2;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a1a30;
    }
    .api-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }
    .api-card {
      background: #12122a;
      border: 1px solid #2a2a44;
      border-radius: 8px;
      padding: 12px;
      overflow: hidden;
    }
    .api-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #222244;
    }
    .api-name {
      font-size: 12px;
      font-weight: 600;
      color: #e4e4ef;
    }
    .api-status {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .api-status.ok { background: #1a4a2a; color: #4ade80; }
    .api-status.error { background: #4a1a1a; color: #f87171; }
    .api-status.skipped { background: #3a3a1a; color: #fbbf24; }
    .api-status.unavailable { background: #2a2a3a; color: #8888a8; }

    .api-data-table { width: 100%; font-size: 11px; border-collapse: collapse; }
    .api-data-table td {
      padding: 2px 0;
      vertical-align: top;
    }
    .api-data-table td:first-child {
      color: #8888a8;
      width: 110px;
      font-weight: 500;
      white-space: nowrap;
      padding-right: 8px;
    }
    .api-data-table td:last-child {
      color: #e4e4ef;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 10px;
      word-break: break-all;
    }
    .api-error {
      font-size: 10px;
      color: #f87171;
      font-style: italic;
    }

    /* ─── Impact Tags ─── */
    .impact-row td:first-child { color: #5865f2 !important; }
    .impact-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .impact-tag {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #1a1a40;
      color: #8888cc;
      border: 1px solid #2a2a55;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .fields-set-tags .impact-tag {
      background: #1a2a1a;
      color: #6aaa6a;
      border-color: #2a442a;
    }

    /* ─── Loading ─── */
    .loading {
      text-align: center;
      color: #8888a8;
      font-size: 14px;
      padding: 60px 20px;
    }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .gen-summary { grid-template-columns: 1fr; }
      .api-grid { grid-template-columns: 1fr; }
      .nav-btn { padding: 6px 12px; }
      .slider-area { min-height: 200px; }
    }
  </style>
</head>
<body>
  <h1>Craftmatic — API Data Comparison</h1>
  <p class="subtitle">Drag the slider to compare default generation vs real API-enriched output. Full API data tables below.</p>

  <div class="nav" id="nav"></div>
  <div class="tabs" id="tabs"></div>
  <div class="layers" id="layers"></div>

  <div class="slider-wrap">
    <div class="slider-area" id="slider">
      <img class="img-noapi" id="imgNoapi" alt="Default (no API)">
      <img class="img-api" id="imgApi" alt="API Enriched">
      <div class="label-left">Default</div>
      <div class="label-right">API Enriched</div>
      <div class="divider" id="divider">
        <div class="divider-handle" id="handle"></div>
      </div>
    </div>
  </div>

  <div class="gen-summary" id="genSummary"></div>
  <div class="api-section" id="apiSection"></div>

<script>
// ─── Static noapi data (no API = generic defaults) ─────────────────────────

const NOAPI_DEFAULTS = {
  style: 'fantasy', floors: 2, grid: '78\u00d720\u00d740', blocks: '15,190',
  wall: 'default', trim: 'default', roof: 'default', door: 'default',
  shape: 'L', roofShape: 'gable', windowSpacing: 3,
};

// ─── Noapi image mapping (pre-generated, same for all locations) ────────────

const NOAPI_VIEWS = {
  exterior: 'noapi_exterior.png',
  cutaway: [0,1,2,3].map(i => `noapi_cutaway_${i}.png`),
  floor: [0,1,2,3].map(i => `noapi_floor_${i}.png`),
};

// ─── State ──────────────────────────────────────────────────────────────────

let allData = [];
let currentIdx = 0;
let currentView = 'exterior';
let currentLayer = 0;
let sliderPos = 0.5;

const VIEW_TYPES = ['exterior', 'cutaway', 'floor'];
const VIEW_LABELS = { exterior: 'Exterior', cutaway: 'Cutaway', floor: 'Floor Plan' };

// ─── DOM refs ───────────────────────────────────────────────────────────────

const navEl = document.getElementById('nav');
const tabsEl = document.getElementById('tabs');
const layersEl = document.getElementById('layers');
const sliderEl = document.getElementById('slider');
const imgNoapi = document.getElementById('imgNoapi');
const imgApi = document.getElementById('imgApi');
const dividerEl = document.getElementById('divider');
const handleEl = document.getElementById('handle');
const genSummaryEl = document.getElementById('genSummary');
const apiSectionEl = document.getElementById('apiSection');

// ─── Load data ──────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const resp = await fetch('comparison-data.json');
    allData = await resp.json();
    render();
  } catch (e) {
    apiSectionEl.innerHTML = '<p class="loading">Failed to load comparison-data.json. Run gen-comparison.ts first.</p>';
  }
}

// ─── Helpers ────────────────────────────────────────────────────────────────

function mc(block) {
  return (block || '').replace('minecraft:', '');
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Build nav ──────────────────────────────────────────────────────────────

function buildNav() {
  navEl.innerHTML = '';
  allData.forEach((loc, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === currentIdx ? ' active' : '');
    const label = loc.address.split(',')[1]?.trim() || loc.key;
    btn.innerHTML = '<span class="nav-label">' + escHtml(label) + '</span><span class="nav-addr">' + escHtml(loc.address) + '</span>';
    btn.onclick = () => { currentIdx = i; currentLayer = 0; render(); };
    navEl.appendChild(btn);
  });
}

function buildTabs() {
  tabsEl.innerHTML = '';
  for (const vt of VIEW_TYPES) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (vt === currentView ? ' active' : '');
    btn.textContent = VIEW_LABELS[vt];
    btn.onclick = () => { currentView = vt; currentLayer = 0; render(); };
    tabsEl.appendChild(btn);
  }
}

function buildLayers() {
  layersEl.innerHTML = '';
  if (currentView === 'exterior') {
    layersEl.classList.add('hidden');
    return;
  }
  layersEl.classList.remove('hidden');
  const loc = allData[currentIdx];
  if (!loc) return;
  const apiLayers = currentView === 'cutaway' ? loc.views.cutaway : loc.views.floor;
  const noapiLayers = NOAPI_VIEWS[currentView];
  const maxLayers = Math.max(apiLayers.length, noapiLayers.length);
  for (let i = 0; i < maxLayers; i++) {
    const btn = document.createElement('button');
    btn.className = 'layer-btn' + (i === currentLayer ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => { currentLayer = i; render(); };
    layersEl.appendChild(btn);
  }
}

// ─── Image loading + slider ─────────────────────────────────────────────────

function updateImages() {
  const loc = allData[currentIdx];
  if (!loc) return;

  let apiPath, noapiPath;
  if (currentView === 'exterior') {
    apiPath = loc.views.exterior.api;
    noapiPath = loc.key + '-' + NOAPI_VIEWS.exterior;
  } else {
    const apiArr = currentView === 'cutaway' ? loc.views.cutaway : loc.views.floor;
    const noapiArr = NOAPI_VIEWS[currentView];
    const apiIdx = Math.min(currentLayer, apiArr.length - 1);
    const noapiIdx = Math.min(currentLayer, noapiArr.length - 1);
    apiPath = apiArr[apiIdx];
    noapiPath = loc.key + '-' + noapiArr[noapiIdx];
  }

  imgNoapi.src = noapiPath;
  imgApi.src = apiPath;

  let loaded = 0;
  const checkHeight = () => {
    loaded++;
    if (loaded >= 2) {
      const containerW = sliderEl.offsetWidth;
      const ratioA = imgApi.naturalHeight / (imgApi.naturalWidth || 1);
      const ratioB = imgNoapi.naturalHeight / (imgNoapi.naturalWidth || 1);
      const maxRatio = Math.max(ratioA, ratioB);
      const h = Math.min(containerW * maxRatio, 800);
      sliderEl.style.height = Math.max(h, 250) + 'px';
      updateSlider();
    }
  };
  imgApi.onload = checkHeight;
  imgNoapi.onload = checkHeight;
  if (imgApi.complete) loaded++;
  if (imgNoapi.complete) loaded++;
  if (loaded >= 2) checkHeight();
}

function updateSlider() {
  const w = sliderEl.offsetWidth;
  const x = Math.round(sliderPos * w);
  imgApi.style.clipPath = 'inset(0 0 0 ' + x + 'px)';
  dividerEl.style.left = x + 'px';
}

// ─── Generation Summary Panel ───────────────────────────────────────────────

function buildGenSummary() {
  const loc = allData[currentIdx];
  if (!loc) { genSummaryEl.innerHTML = ''; return; }

  const g = loc.genOptions;
  const noapi = NOAPI_DEFAULTS;

  const rows = [
    ['Style', noapi.style, g.style],
    ['Floors', noapi.floors, g.floors],
    ['Grid', noapi.grid, g.width + '\u00d7' + (loc.grid.height) + '\u00d7' + (g.length || '?')],
    ['Blocks', noapi.blocks, loc.grid.blocks?.toLocaleString()],
    ['Sq Ft', '\u2014', loc.property.sqft?.toLocaleString()],
    ['Beds/Baths', '\u2014', (loc.property.bedrooms || '?') + ' / ' + (loc.property.bathrooms || '?')],
    ['Year', '\u2014', loc.property.yearUncertain ? '\u2014' : loc.property.yearBuilt],
    ['Wall', noapi.wall, mc(g.wallOverride) || 'default'],
    ['Trim', noapi.trim, mc(g.trimOverride) || 'default'],
    ['Roof', noapi.roof, g.roofOverride ? mc(g.roofOverride.cap) : 'default'],
    ['Door', noapi.door, g.doorOverride || 'default'],
    ['Shape', noapi.shape, g.floorPlanShape || 'rect'],
    ['Roof Shape', noapi.roofShape, g.roofShape || 'gable'],
    ['Win Spacing', noapi.windowSpacing, g.windowSpacing || 3],
    ['Roof Height', 'default', g.roofHeightOverride ?? 'default'],
  ];

  function makeTable(side) {
    let html = '<div class="gen-card ' + side + '"><h4>' + (side === 'noapi' ? 'Default (No API)' : 'API Enriched') + '</h4><table>';
    for (const [label, noapiVal, apiVal] of rows) {
      const val = side === 'noapi' ? noapiVal : apiVal;
      const isChanged = side === 'api' && String(noapiVal) !== String(apiVal);
      const style = isChanged ? ' style="color:#4ade80;font-weight:600"' : '';
      html += '<tr><td>' + label + '</td><td' + style + '>' + escHtml(val) + '</td></tr>';
    }
    html += '</table></div>';
    return html;
  }

  genSummaryEl.innerHTML = makeTable('noapi') + makeTable('api');
}

// ─── API Data Tables ────────────────────────────────────────────────────────

function buildApiTables() {
  const loc = allData[currentIdx];
  if (!loc) { apiSectionEl.innerHTML = ''; return; }

  let html = '<h3>API Data Sources (' + loc.apis.filter(a => a.status === 'ok').length + '/' + loc.apis.length + ' active)</h3>';
  html += '<div class="api-grid">';

  for (const api of loc.apis) {
    html += '<div class="api-card">';
    html += '<div class="api-card-header">';
    html += '<span class="api-name">' + escHtml(api.name) + '</span>';
    html += '<span class="api-status ' + api.status + '">' + api.status + '</span>';
    html += '</div>';

    if (api.error && api.status !== 'ok') {
      html += '<p class="api-error">' + escHtml(api.error) + '</p>';
    }

    // API returned data
    if (api.data && Object.keys(api.data).length > 0) {
      html += '<table class="api-data-table">';
      for (const [k, v] of Object.entries(api.data)) {
        if (v === null || v === undefined) continue;
        html += '<tr><td>' + escHtml(k) + '</td><td>' + escHtml(v) + '</td></tr>';
      }
      html += '</table>';
    }

    // Fields set on PropertyData
    if (api.fieldsSet && api.fieldsSet.length > 0) {
      html += '<table class="api-data-table" style="margin-top:6px"><tr class="impact-row"><td>Sets</td><td>';
      html += '<div class="impact-tags fields-set-tags">';
      for (const f of api.fieldsSet) {
        html += '<span class="impact-tag">' + escHtml(f) + '</span>';
      }
      html += '</div></td></tr></table>';
    }

    // Generation impact
    if (api.impactedGenFields && api.impactedGenFields.length > 0) {
      html += '<table class="api-data-table" style="margin-top:4px"><tr class="impact-row"><td>Impacts</td><td>';
      html += '<div class="impact-tags">';
      for (const f of api.impactedGenFields) {
        html += '<span class="impact-tag">' + escHtml(f) + '</span>';
      }
      html += '</div></td></tr></table>';
    }

    html += '</div>';
  }

  html += '</div>';
  apiSectionEl.innerHTML = html;
}

// ─── Full render ────────────────────────────────────────────────────────────

function render() {
  if (allData.length === 0) return;
  buildNav();
  buildTabs();
  buildLayers();
  updateImages();
  buildGenSummary();
  buildApiTables();
}

// ─── Drag handling ──────────────────────────────────────────────────────────

let dragging = false;

function startDrag(e) {
  e.preventDefault();
  dragging = true;
}

function moveDrag(e) {
  if (!dragging) return;
  e.preventDefault();
  const rect = sliderEl.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  sliderPos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  updateSlider();
}

function endDrag() {
  dragging = false;
}

function jumpSlider(e) {
  if (e.target === handleEl) return;
  const rect = sliderEl.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  sliderPos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  updateSlider();
  dragging = true;
}

handleEl.addEventListener('mousedown', startDrag);
handleEl.addEventListener('touchstart', startDrag, { passive: false });
sliderEl.addEventListener('mousedown', jumpSlider);
sliderEl.addEventListener('touchstart', jumpSlider, { passive: false });
document.addEventListener('mousemove', moveDrag);
document.addEventListener('touchmove', moveDrag, { passive: false });
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

window.addEventListener('resize', () => {
  updateSlider();
  const containerW = sliderEl.offsetWidth;
  const ratioA = imgApi.naturalHeight / (imgApi.naturalWidth || 1);
  const ratioB = imgNoapi.naturalHeight / (imgNoapi.naturalWidth || 1);
  const maxRatio = Math.max(ratioA, ratioB);
  const h = Math.min(containerW * maxRatio, 800);
  sliderEl.style.height = Math.max(h, 250) + 'px';
});

// ─── Init ───────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
