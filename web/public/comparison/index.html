<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Craftmatic — 3-Tier API Comparison</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a14;
      color: #e4e4ef;
      min-height: 100vh;
      padding: 20px;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #5865f2;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #8888a8;
      margin-bottom: 20px;
    }

    /* ─── Location Nav ─── */
    .nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .nav-btn {
      background: #16162a;
      border: 1px solid #2a2a44;
      color: #b0b0c8;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      line-height: 1.3;
      text-align: center;
    }
    .nav-btn:hover { border-color: #5865f2; color: #e4e4ef; }
    .nav-btn.active { background: #5865f2; border-color: #5865f2; color: #fff; }
    .nav-label { font-weight: 600; font-size: 13px; display: block; }
    .nav-addr { font-size: 10px; opacity: 0.7; display: block; margin-top: 2px; }

    /* ─── View Tabs ─── */
    .tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 12px; }
    .tab-btn {
      background: #16162a;
      border: 1px solid #2a2a44;
      color: #b0b0c8;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .tab-btn:hover { border-color: #5865f2; }
    .tab-btn.active { background: #2a2a44; border-color: #5865f2; color: #e4e4ef; }

    /* ─── Layer Selector ─── */
    .layers { display: flex; justify-content: center; gap: 4px; margin-bottom: 12px; min-height: 28px; }
    .layers.hidden { display: none; }
    .layer-btn {
      width: 28px; height: 28px;
      background: #16162a;
      border: 1px solid #2a2a44;
      color: #b0b0c8;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .layer-btn:hover { border-color: #5865f2; }
    .layer-btn.active { background: #5865f2; border-color: #5865f2; color: #fff; }

    /* ─── Slider Container ─── */
    .slider-wrap {
      position: relative;
      max-width: 1200px;
      margin: 0 auto 20px;
      background: #0d0d1a;
      border: 1px solid #2a2a44;
      border-radius: 10px;
      overflow: hidden;
    }
    .slider-area {
      position: relative;
      width: 100%;
      min-height: 300px;
      touch-action: none;
      cursor: col-resize;
    }
    .slider-area img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    .img-noapi { z-index: 1; }
    .img-someapis { z-index: 2; }
    .img-allapis { z-index: 3; }

    /* ─── Dividers ─── */
    .divider {
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      z-index: 10;
      pointer-events: none;
    }
    .divider-1 { background: #f59e0b; }
    .divider-2 { background: #28a745; }
    .divider-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px; height: 32px;
      border: 2px solid #fff;
      border-radius: 50%;
      z-index: 11;
      pointer-events: auto;
      cursor: col-resize;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .divider-1 .divider-handle { background: #f59e0b; }
    .divider-2 .divider-handle { background: #28a745; }
    .divider-handle::before {
      content: '◄►';
      color: #fff;
      font-size: 9px;
      letter-spacing: -1px;
    }

    /* ─── Tier Labels ─── */
    .tier-label {
      position: absolute;
      top: 10px;
      z-index: 15;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      white-space: nowrap;
    }
    .label-noapi {
      left: 10px;
      background: rgba(220, 60, 60, 0.85);
      color: #fff;
    }
    .label-someapis {
      background: rgba(245, 158, 11, 0.85);
      color: #fff;
    }
    .label-allapis {
      right: 10px;
      background: rgba(40, 167, 69, 0.85);
      color: #fff;
    }

    /* ─── Stats Panel ─── */
    .stats {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: #16162a;
      border: 1px solid #2a2a44;
      border-radius: 8px;
      padding: 12px;
    }
    .stat-card h4 {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid #2a2a44;
    }
    .stat-card.noapi h4 { color: #dc3c3c; }
    .stat-card.someapis h4 { color: #f59e0b; }
    .stat-card.allapis h4 { color: #28a745; }
    .stat-card table { width: 100%; font-size: 10px; border-collapse: collapse; }
    .stat-card td { padding: 2px 0; vertical-align: top; }
    .stat-card td:first-child { color: #8888a8; width: 80px; font-weight: 500; }
    .stat-card td:last-child {
      color: #e4e4ef;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 10px;
    }
    /* Highlight cells that differ from the tier to the left */
    .stat-card td.changed {
      color: #5865f2;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .stats { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      body { padding: 10px; }
      .nav-btn { padding: 6px 12px; }
      .slider-area { min-height: 200px; }
    }
  </style>

const VIEW_TYPES = ['exterior', 'cutaway', 'floor'];
const VIEW_LABELS = { exterior: 'Exterior', cutaway: 'Cutaway', floor: 'Floor Plan' };

// ─── Build nav ──────────────────────────────────────────────────────────────

function buildNav() {
  navEl.innerHTML = '';
  for (const [key, loc] of Object.entries(LOCATIONS)) {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (key === currentLoc ? ' active' : '');
    btn.innerHTML = `<span class="nav-label">${loc.label}</span><span class="nav-addr">${loc.address}</span>`;
    btn.onclick = () => { currentLoc = key; currentLayer = 0; render(); };
    navEl.appendChild(btn);
  }
}

function buildTabs() {
  tabsEl.innerHTML = '';
  for (const vt of VIEW_TYPES) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (vt === currentView ? ' active' : '');
    btn.textContent = VIEW_LABELS[vt];
    btn.onclick = () => { currentView = vt; currentLayer = 0; render(); };
    tabsEl.appendChild(btn);
  }
}

function buildLayers() {
  layersEl.innerHTML = '';
  if (currentView === 'exterior') {
    layersEl.classList.add('hidden');
    return;
  }
  layersEl.classList.remove('hidden');
  const loc = LOCATIONS[currentLoc];
  const viewData = loc.views[currentView];
  const maxLayers = Math.max(
    viewData.noapi.length, viewData.someapis.length, viewData.allapis.length
  );
  for (let i = 0; i < maxLayers; i++) {
    const btn = document.createElement('button');
    btn.className = 'layer-btn' + (i === currentLayer ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => { currentLayer = i; render(); };
    layersEl.appendChild(btn);
  }
}

// ─── Image loading + slider ─────────────────────────────────────────────────

function getImagePath(tier) {
  const loc = LOCATIONS[currentLoc];
  const viewData = loc.views[currentView];
  if (currentView === 'exterior') return viewData[tier];
  const arr = viewData[tier];
  const idx = Math.min(currentLayer, arr.length - 1);
  return arr[idx];
}

function updateImages() {
  imgNoapi.src = getImagePath('noapi');
  imgSomeapis.src = getImagePath('someapis');
  imgAllapis.src = getImagePath('allapis');

  let loaded = 0;
  const checkHeight = () => {
    loaded++;
    if (loaded >= 3) {
      const containerW = sliderEl.offsetWidth;
      const ratios = [imgNoapi, imgSomeapis, imgAllapis].map(
        img => img.naturalHeight / (img.naturalWidth || 1)
      );
      const maxRatio = Math.max(...ratios);
      const h = Math.min(containerW * maxRatio, 800);
      sliderEl.style.height = Math.max(h, 250) + 'px';
      updateSlider();
    }
  };
  imgNoapi.onload = checkHeight;
  imgSomeapis.onload = checkHeight;
  imgAllapis.onload = checkHeight;
  if (imgNoapi.complete) loaded++;
  if (imgSomeapis.complete) loaded++;
  if (imgAllapis.complete) loaded++;
  if (loaded >= 3) checkHeight();
}

function updateSlider() {
  const w = sliderEl.offsetWidth;
  const x1 = Math.round(pos1 * w);
  const x2 = Math.round(pos2 * w);

  imgSomeapis.style.clipPath = `inset(0 0 0 ${x1}px)`;
  imgAllapis.style.clipPath = `inset(0 0 0 ${x2}px)`;
  divider1.style.left = x1 + 'px';
  divider2.style.left = x2 + 'px';

  // Position the "Basic APIs" label between the two dividers
  const midX = (x1 + x2) / 2;
  labelSome.style.left = midX + 'px';
  labelSome.style.transform = 'translateX(-50%)';
}

// ─── Stats panel ────────────────────────────────────────────────────────────

function buildStats() {
  const loc = LOCATIONS[currentLoc];
  const fields = ['style', 'floors', 'grid', 'blocks', 'sqft', 'beds', 'baths', 'year', 'sources', 'notes'];
  const labels = {
    style: 'Style', floors: 'Floors', grid: 'Grid', blocks: 'Blocks',
    sqft: 'Sq Ft', beds: 'Beds', baths: 'Baths', year: 'Year Built',
    sources: 'Sources', notes: 'Notes'
  };

  const makeTable = (tier, prevTier) => {
    const data = loc[tier];
    const prev = prevTier ? loc[prevTier] : null;
    let html = `<div class="stat-card ${tier}"><h4>${TIER_LABELS[tier]}</h4><table>`;
    for (const field of fields) {
      const val = field === 'beds' || field === 'baths'
        ? `${data.beds} / ${data.baths}` : String(data[field] ?? '\u2014');
      if (field === 'baths') continue; // combined with beds
      const prevVal = prev ? (field === 'beds' ? `${prev.beds} / ${prev.baths}` : String(prev[field] ?? '\u2014')) : null;
      const changed = prevVal && val !== prevVal ? ' class="changed"' : '';
      const label = field === 'beds' ? 'Beds / Baths' : labels[field];
      html += `<tr><td>${label}</td><td${changed}>${val}</td></tr>`;
    }
    html += '</table></div>';
    return html;
  };

  statsEl.innerHTML = makeTable('noapi', null) + makeTable('someapis', 'noapi') + makeTable('allapis', 'someapis');
}

// ─── Full render ────────────────────────────────────────────────────────────

function render() {
  buildNav();
  buildTabs();
  buildLayers();
  updateImages();
  buildStats();
}

// ─── Drag handling ──────────────────────────────────────────────────────────

let activeDivider = 0; // 0=none, 1=left, 2=right
const MIN_GAP = 0.05;  // minimum gap between dividers (5% of width)

function startDrag(e, divNum) {
  e.preventDefault();
  e.stopPropagation();
  activeDivider = divNum;
}

function moveDrag(e) {
  if (!activeDivider) return;
  e.preventDefault();
  const rect = sliderEl.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const raw = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));

  if (activeDivider === 1) {
    pos1 = Math.min(raw, pos2 - MIN_GAP);
  } else {
    pos2 = Math.max(raw, pos1 + MIN_GAP);
  }
  updateSlider();
}

function endDrag() {
  activeDivider = 0;
}

// Jump on click — pick nearest divider
function jumpSlider(e) {
  if (e.target === handle1 || e.target === handle2) return;
  const rect = sliderEl.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const raw = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  // Pick whichever divider is closest
  const d1 = Math.abs(raw - pos1);
  const d2 = Math.abs(raw - pos2);
  if (d1 <= d2) {
    pos1 = Math.min(raw, pos2 - MIN_GAP);
    activeDivider = 1;
  } else {
    pos2 = Math.max(raw, pos1 + MIN_GAP);
    activeDivider = 2;
  }
  updateSlider();
}

handle1.addEventListener('mousedown', e => startDrag(e, 1));
handle1.addEventListener('touchstart', e => startDrag(e, 1), { passive: false });
handle2.addEventListener('mousedown', e => startDrag(e, 2));
handle2.addEventListener('touchstart', e => startDrag(e, 2), { passive: false });
sliderEl.addEventListener('mousedown', jumpSlider);
sliderEl.addEventListener('touchstart', jumpSlider, { passive: false });
document.addEventListener('mousemove', moveDrag);
document.addEventListener('touchmove', moveDrag, { passive: false });
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

window.addEventListener('resize', () => {
  const containerW = sliderEl.offsetWidth;
  const ratios = [imgNoapi, imgSomeapis, imgAllapis].map(
    img => img.naturalHeight / (img.naturalWidth || 1)
  );
  const maxRatio = Math.max(...ratios);
  const h = Math.min(containerW * maxRatio, 800);
  sliderEl.style.height = Math.max(h, 250) + 'px';
  updateSlider();
});

// ─── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
